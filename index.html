<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Office Finance Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: 600; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- Login -->
  <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 to-black">
    <div class="bg-gray-900 p-8 rounded-2xl shadow-2xl w-full max-w-md">
      <h1 class="text-3xl font-bold text-center mb-8">Office Finance</h1>
      <input type="text" id="username" value="admin" class="w-full p-4 bg-gray-800 rounded-xl mb-4" placeholder="Username">
      <input type="password" id="password" value="admin123" class="w-full p-4 bg-gray-800 rounded-xl mb-6" placeholder="Password">
      <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-semibold text-lg">Login</button>
    </div>
  </div>

  <!-- Main App -->
  <div id="mainApp" class="hidden">
    <header class="bg-gray-900 border-b border-gray-800 py-4 px-6 flex justify-between items-center">
      <h1 class="text-2xl font-bold">Office Finance Manager</h1>
      <button onclick="logout()" class="px-5 py-2 bg-red-600 hover:bg-red-700 rounded-xl">Logout</button>
    </header>

    <div class="max-w-screen-2xl mx-auto px-6 pt-6">
        <div class="flex border-b border-gray-800 overflow-x-auto">
  <button onclick="switchTab(0)" class="tab-btn tab-active px-6 py-3">Dashboard</button>
  <button onclick="switchTab(1)" class="tab-btn px-6 py-3">Banking</button>
  <button onclick="switchTab(2)" class="tab-btn tab-active px-6 py-3">Savings</button>
  <button onclick="switchTab(3)" class="tab-btn px-6 py-3">Invoices</button>
        </div>
    </div>

    <!-- DASHBOARD TAB -->
    <div id="tab-0" class="tab-content max-w-screen-2xl mx-auto px-6 py-8">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-semibold">Dashboard</h2>
        <select id="fySelect" onchange="loadDashboard()" class="bg-gray-800 border border-gray-700 rounded-xl p-3 min-w-40"></select>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10" id="dashSummary"></div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-gray-900 rounded-2xl p-6 border border-gray-800">
        <h3 class="text-xl font-semibold mb-4">Expenses by Category</h3>
        <div id="expenseBreakdown" class="space-y-4"></div>
        </div>
        <div class="bg-gray-900 rounded-2xl p-6 border border-gray-800">
        <h3 class="text-xl font-semibold mb-4">Recent Transactions</h3>
        <div id="recentTransactions" class="space-y-4"></div>
        </div>
    </div>
    </div>

    <!-- Banking Tab -->
    <div id="tab-1" class="tab-content max-w-screen-2xl mx-auto px-6 py-8">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-semibold">Banking Transactions</h2>
        <button onclick="loadSelectedBank()" class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-xl flex items-center gap-2">
          <i class="fas fa-sync"></i> Refresh
        </button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div>
          <label class="block text-sm mb-2">Bank Account</label>
          <select id="bankSelect" onchange="loadSelectedBank()" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3"></select>
        </div>
        <div>
          <label class="block text-sm mb-2">Year</label>
          <select id="yearSelect" onchange="loadSelectedBank()" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3"></select>
        </div>
        <div>
          <label class="block text-sm mb-2">Search</label>
          <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Search narration..." class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3">
        </div>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="summaryCards"></div>

      <div class="bg-gray-900 rounded-2xl overflow-hidden border border-gray-800">
        <table class="w-full">
          <thead class="bg-gray-800">
            <tr>
              <th class="p-4 text-left">Date</th>
              <th class="p-4 text-left">Narration</th>
              <th class="p-4 text-right">Withdrawal</th>
              <th class="p-4 text-right">Deposit</th>
              <th class="p-4 text-right">Balance</th>
            </tr>
          </thead>
          <tbody id="transactionBody" class="divide-y divide-gray-800"></tbody>
        </table>
      </div>
    </div>

    <!-- SAVINGS TAB -->
    <div id="tab-2" class="tab-content max-w-screen-2xl mx-auto px-6 py-8">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-semibold">Savings (FD & RD)</h2>
        <button onclick="showAddSavingsModal()" class="bg-green-600 hover:bg-green-700 px-5 py-2 rounded-xl flex items-center gap-2">
        <i class="fas fa-plus"></i> Add New FD/RD
        </button>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8" id="savingsSummary"></div>

    <!-- Savings Table -->
    <div class="bg-gray-900 rounded-2xl overflow-hidden border border-gray-800">
        <table class="w-full">
        <thead class="bg-gray-800">
            <tr>
            <th class="p-4 text-left">ID</th>
            <th class="p-4 text-left">Type</th>
            <th class="p-4 text-left">Bank</th>
            <th class="p-4 text-right">Principal</th>
            <th class="p-4 text-right">Interest Rate</th>
            <th class="p-4 text-left">Maturity Date</th>
            <th class="p-4 text-right">Maturity Value</th>
            <th class="p-4 text-center">Status</th>
            <th class="p-4 text-center">Actions</th>
            </tr>
        </thead>
        <tbody id="savingsBody" class="divide-y divide-gray-800"></tbody>
        </table>
    </div>
    </div>

    <!-- Placeholder Tabs -->
    
   
    <div id="tab-3" class="tab-content hidden p-8 text-center text-xl">Invoices Coming Soon...</div>
  </div>

<script>
// ============== CONFIG ==============
const MANIFEST_URL = 'manifest.json';

let manifest = {};
let currentTransactions = [];

// ============== LOGIN ==============
function login() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  switchTab(0);   // Start with Dashboard
}
function logout() {
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
}

// ============== TABS ==============
function switchTab(n) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.getElementById(`tab-${n}`).classList.remove('hidden');
  
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
  document.querySelectorAll('.tab-btn')[n].classList.add('tab-active');

  // Load dashboard data when switching to it
  if (n === 0) {
    setTimeout(() => {
      if (allTransactions.length === 0) {
        loadAllDataForDashboard().then(loadDashboard);
      } else {
        loadDashboard();
      }
    }, 100);
  }
  if (n === 2) {
  setTimeout(loadSavingsTab, 100);
}
}

// ============== LOAD MANIFEST ==============
async function loadManifest() {
  try {
    const res = await fetch(MANIFEST_URL);
    manifest = await res.json();
    populateBankSelect();
    await loadAllDataForDashboard();   // ← Add this line
  } catch (e) {
    console.error(e);
  }
}

function populateBankSelect() {
  const select = document.getElementById('bankSelect');
  select.innerHTML = '<option value="">Select Bank</option>';
  manifest.banks.forEach(bank => {
    const opt = document.createElement('option');
    opt.value = bank.bankName;
    opt.textContent = `${bank.bankName} - ${bank.accountNumber}`;
    select.appendChild(opt);
  });
}

// ============== LOAD BANK ==============
async function loadSelectedBank() {
  const bankName = document.getElementById('bankSelect').value;
  const year = document.getElementById('yearSelect').value;
  if (!bankName) return;

  const bank = manifest.banks.find(b => b.bankName === bankName);
  if (!bank) return;

  const fileObj = year ? bank.files.find(f => f.year === year) : bank.files[0];
  if (!fileObj) return;

  try {
    const res = await fetch(fileObj.filePath);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    
    const data = await res.json();
    currentTransactions = normalizeTransactions(data);
    
    populateYearSelect(bank);
    renderSummary();
    renderTable(currentTransactions);
  } catch (e) {
    console.error(e);
    alert(`Failed to load ${bankName} ${year || ''}. Check file path in manifest.`);
  }
}

function populateYearSelect(bank) {
  const select = document.getElementById('yearSelect');
  select.innerHTML = '';
  bank.files.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f.year;
    opt.textContent = f.year;
    select.appendChild(opt);
  });
}

// ============== DASHBOARD FUNCTIONS ==============
let allTransactions = [];

async function loadAllDataForDashboard() {
  allTransactions = [];
  for (const bank of manifest.banks) {
    for (const file of bank.files) {
      try {
        const res = await fetch(file.filePath);
        if (res.ok) {
          const data = await res.json();
          allTransactions = allTransactions.concat(normalizeTransactions(data));
        }
      } catch (e) {
        console.warn("Failed to load file:", file.filePath);
      }
    }
  }
  return allTransactions;
}

function loadDashboard() {
  if (allTransactions.length === 0) return;

  const fySelect = document.getElementById('fySelect');
  if (fySelect.options.length === 0) populateFYSelect();

  const fy = fySelect.value || getCurrentFY();
  const filtered = filterByFY(allTransactions, fy);

  renderDashSummary(filtered);
  renderExpenseBreakdown(filtered);
  renderRecentTransactions(filtered);
}

function populateFYSelect() {
  const select = document.getElementById('fySelect');
  const fys = new Set();
  allTransactions.forEach(t => {
    const fy = getFYFromDate(t.Date);
    if (fy) fys.add(fy);
  });
  [...fys].sort().reverse().forEach(fy => {
    const opt = document.createElement('option');
    opt.value = fy;
    opt.textContent = fy;
    select.appendChild(opt);
  });
}

function getCurrentFY() {
  const now = new Date();
  const y = now.getFullYear();
  return (now.getMonth() + 1) >= 4 ? `${y}-${(y+1).toString().slice(2)}` : `${y-1}-${y.toString().slice(2)}`;
}

function getFYFromDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return null;
  const y = d.getFullYear();
  const m = d.getMonth() + 1;
  return m >= 4 ? `${y}-${(y+1).toString().slice(2)}` : `${y-1}-${y.toString().slice(2)}`;
}

function filterByFY(transactions, fy) {
  if (!fy) return transactions;
  const [startY] = fy.split('-').map(Number);
  const start = new Date(`${startY}-04-01`);
  const end = new Date(`${startY + 1}-03-31`);
  return transactions.filter(t => {
    const d = new Date(t.Date);
    return d >= start && d <= end;
  });
}

function renderDashSummary(data) {
  let income = 0, expense = 0;
  data.forEach(t => {
    income += t.Deposit || 0;
    expense += t.Withdrawal || 0;
  });

  document.getElementById('dashSummary').innerHTML = `
    <div class="bg-gray-900 p-6 rounded-3xl border border-green-500/30">
      <p class="text-green-400">Total Income</p>
      <p class="text-3xl font-bold">₹${income.toLocaleString('en-IN')}</p>
    </div>
    <div class="bg-gray-900 p-6 rounded-3xl border border-red-500/30">
      <p class="text-red-400">Total Expenses</p>
      <p class="text-3xl font-bold">₹${expense.toLocaleString('en-IN')}</p>
    </div>
    <div class="bg-gray-900 p-6 rounded-3xl border border-blue-500/30">
      <p class="text-blue-400">Net Savings</p>
      <p class="text-3xl font-bold ${income-expense>=0?'text-green-400':'text-red-400'}">₹${(income-expense).toLocaleString('en-IN')}</p>
    </div>
    <div class="bg-gray-900 p-6 rounded-3xl border border-gray-700">
      <p class="text-gray-400">Transactions</p>
      <p class="text-3xl font-bold">${data.length}</p>
    </div>
  `;
}

function renderExpenseBreakdown(data) {
  const cat = {};
  data.forEach(t => {
    if (t.Withdrawal <= 0) return;
    let key = "Others";
    const n = (t.Narration || "").toLowerCase();
    if (n.includes("salary")) key = "Salary";
    else if (n.includes("rent") || n.includes("fd")) key = "Rent & FD";
    else if (n.includes("custom") || n.includes("duty")) key = "Customs";
    else if (n.includes("tax")) key = "Tax";
    else if (n.includes("dmart") || n.includes("grocery")) key = "Groceries";

    cat[key] = (cat[key] || 0) + t.Withdrawal;
  });

  let html = '';
  Object.keys(cat).sort((a,b) => cat[b]-cat[a]).forEach(key => {
    html += `<div class="flex justify-between py-1"><span>${key}</span><span class="font-medium">₹${cat[key].toLocaleString('en-IN')}</span></div>`;
  });
  document.getElementById('expenseBreakdown').innerHTML = html || '<p class="text-gray-500">No expense data</p>';
}

function renderRecentTransactions(data) {
  const recent = data.slice(0, 10);
  let html = '';
  recent.forEach(t => {
    const amt = t.Withdrawal ? `-₹${t.Withdrawal.toLocaleString('en-IN')}` : `+₹${t.Deposit.toLocaleString('en-IN')}`;
    html += `
      <div class="flex justify-between items-center text-sm py-2 border-l-4 ${t.Withdrawal ? 'border-red-500' : 'border-green-500'} pl-3">
        <div class="flex-1">
          <div class="text-gray-400 text-xs">${t.Date}</div>
          <div class="line-clamp-1">${t.Narration}</div>
        </div>
        <div class="font-medium ${t.Withdrawal ? 'text-red-400' : 'text-green-400'}">${amt}</div>
      </div>`;
  });
  document.getElementById('recentTransactions').innerHTML = html || '<p class="text-gray-500">No transactions</p>';
}

let savingsData = { savings: [] };
let editingIndex = -1;   // -1 means add new

// Load Savings
async function loadSavings() {
  try {
    const res = await fetch('data/savings/savings.json');
    let raw = await res.json();
    savingsData = Array.isArray(raw) ? { savings: raw } : raw;
    renderSavingsSummary();
    renderSavingsTable();
  } catch (e) {
    console.error(e);
    savingsData = { savings: [] };
  }
}


// Render Summary
function renderSavingsSummary() {
  const items = savingsData.savings || [];
  let totalFD = 0, totalRD = 0;

  items.forEach(item => {
    const prin = parseFloat(item.principal) || 0;
    if (item.type === "FD") totalFD += prin;
    if (item.type === "RD") totalRD += prin;
  });

  document.getElementById('savingsSummary').innerHTML = `
    <div class="bg-gray-900 p-6 rounded-3xl border border-amber-500/30">
      <p class="text-amber-400">Total FD</p>
      <p class="text-3xl font-bold">₹${totalFD.toLocaleString('en-IN')}</p>
    </div>
    <div class="bg-gray-900 p-6 rounded-3xl border border-purple-500/30">
      <p class="text-purple-400">Total RD</p>
      <p class="text-3xl font-bold">₹${totalRD.toLocaleString('en-IN')}</p>
    </div>
    <div class="bg-gray-900 p-6 rounded-3xl border border-blue-500/30">
      <p class="text-blue-400">Total Savings</p>
      <p class="text-3xl font-bold">₹${(totalFD + totalRD).toLocaleString('en-IN')}</p>
    </div>
    <div class="bg-gray-900 p-6 rounded-3xl border border-gray-700">
      <p class="text-gray-400">Active Instruments</p>
      <p class="text-3xl font-bold">${items.length}</p>
    </div>
  `;
}

// Render Table
function renderSavingsTable() {
  const tbody = document.getElementById('savingsBody');
  tbody.innerHTML = '';
  const items = savingsData.savings || [];

  items.forEach((item, index) => {
    const row = document.createElement('tr');
    row.className = "hover:bg-gray-800";
    row.innerHTML = `
      <td class="p-4 font-medium">${item.id}</td>
      <td class="p-4">${item.type}</td>
      <td class="p-4">${item.bankName}</td>
      <td class="p-4 text-right">₹${parseFloat(item.principal || 0).toLocaleString('en-IN')}</td>
      <td class="p-4 text-right">${item.interestRate || '-'}</td>
      <td class="p-4">${item.maturityDate || item.Maturity || '-'}</td>
      <td class="p-4 text-right font-medium">₹${parseFloat(item.Maturity || item.currentValue || 0).toLocaleString('en-IN')}</td>
      <td class="p-4 text-center">
        <span class="px-3 py-1 rounded-full text-xs ${item.status === 'Active' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">
          ${item.status || 'Active'}
        </span>
      </td>
      <td class="p-4 text-center space-x-3">
        <button onclick="editSavings(${index})" class="text-blue-400 hover:text-blue-500 text-sm">Edit</button>
        <button onclick="breakSavings('${item.id}', ${index})" class="text-red-400 hover:text-red-500 text-sm">Break</button>
      </td>
    `;
    tbody.appendChild(row);
  });
}

function editSavings(index) {
  editingIndex = index;
  showSavingsModalForm();
}

// ==================== SAVINGS MODAL ====================
function showAddSavingsModal() {
  editingIndex = -1;
  showSavingsModalForm();
}

function showSavingsModalForm() {
  const item = editingIndex >= 0 ? savingsData.savings[editingIndex] : {};

  const modal = document.createElement('div');
  modal.id = 'savingsModal';
  modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50';
  modal.innerHTML = `
    <div class="bg-gray-900 rounded-2xl w-full max-w-lg mx-4 p-8">
      <h2 class="text-2xl font-semibold mb-6">${editingIndex >= 0 ? 'Edit' : 'Add New'} Savings</h2>
      
      <div class="space-y-5">
        <div>
          <label class="block text-sm mb-1">ID</label>
          <input id="modal-id" value="${item.id || ''}" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3">
        </div>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm mb-1">Type</label>
            <select id="modal-type" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3">
              <option value="FD" ${item.type === 'FD' ? 'selected' : ''}>FD</option>
              <option value="RD" ${item.type === 'RD' ? 'selected' : ''}>RD</option>
            </select>
          </div>
          <div>
            <label class="block text-sm mb-1">Bank</label>
            <input id="modal-bank" value="${item.bankName || 'HDFC'}" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm mb-1">Principal (₹)</label>
            <input id="modal-principal" type="number" value="${item.principal || ''}" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3">
          </div>
          <div>
            <label class="block text-sm mb-1">Interest Rate</label>
            <input id="modal-rate" value="${item.interestRate || ''}" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3">
          </div>
        </div>

        <div>
          <label class="block text-sm mb-1">Maturity Date</label>
          <input id="modal-maturity" value="${item.maturityDate || item.Maturity || ''}" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3">
        </div>

        <div>
          <label class="block text-sm mb-1">Status</label>
          <select id="modal-status" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3">
            <option value="Active" ${item.status === 'Active' ? 'selected' : ''}>Active</option>
            <option value="Broken" ${item.status === 'Broken' ? 'selected' : ''}>Broken</option>
            <option value="Matured" ${item.status === 'Matured' ? 'selected' : ''}>Matured</option>
          </select>
        </div>

        <div>
          <label class="block text-sm mb-1">Notes</label>
          <textarea id="modal-notes" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 h-20">${item.notes || ''}</textarea>
        </div>
      </div>

      <div class="flex gap-3 mt-8">
        <button onclick="saveSavingsModal()" class="flex-1 bg-green-600 hover:bg-green-700 py-3 rounded-xl font-semibold">Save</button>
        <button onclick="closeSavingsModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-3 rounded-xl font-semibold">Cancel</button>
      </div>
    </div>
  `;

  document.body.appendChild(modal);
}


function showSavingsModal() {
  const item = editingIndex >= 0 ? savingsData.savings[editingIndex] : {};

  const modalHTML = `
    <div id="savingsModal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
      <div class="bg-gray-900 rounded-2xl w-full max-w-lg mx-4 p-8">
        <h2 class="text-2xl font-semibold mb-6">${editingIndex >= 0 ? 'Edit' : 'Add New'} ${item.type || 'FD/RD'}</h2>
        
        <div class="space-y-5">
          <div>
            <label class="block text-sm mb-1">ID</label>
            <input id="modal-id" value="${item.id || ''}" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3">
          </div>
          
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm mb-1">Type</label>
              <select id="modal-type" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3">
                <option value="FD" ${item.type === 'FD' ? 'selected' : ''}>FD</option>
                <option value="RD" ${item.type === 'RD' ? 'selected' : ''}>RD</option>
              </select>
            </div>
            <div>
              <label class="block text-sm mb-1">Bank</label>
              <input id="modal-bank" value="${item.bankName || 'HDFC'}" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3">
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm mb-1">Principal (₹)</label>
              <input id="modal-principal" type="number" value="${item.principal || ''}" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3">
            </div>
            <div>
              <label class="block text-sm mb-1">Interest Rate (%)</label>
              <input id="modal-rate" value="${item.interestRate || ''}" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3">
            </div>
          </div>

          <div>
            <label class="block text-sm mb-1">Maturity Date</label>
            <input id="modal-maturity" value="${item.maturityDate || item.Maturity || ''}" placeholder="DD-MM-YYYY" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3">
          </div>

          <div>
            <label class="block text-sm mb-1">Status</label>
            <select id="modal-status" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3">
              <option value="Active" ${item.status === 'Active' ? 'selected' : ''}>Active</option>
              <option value="Broken" ${item.status === 'Broken' ? 'selected' : ''}>Broken</option>
              <option value="Matured" ${item.status === 'Matured' ? 'selected' : ''}>Matured</option>
            </select>
          </div>

          <div>
            <label class="block text-sm mb-1">Notes</label>
            <textarea id="modal-notes" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 h-20">${item.notes || ''}</textarea>
          </div>
        </div>

        <div class="flex gap-3 mt-8">
          <button onclick="saveSavingsModal()" class="flex-1 bg-green-600 hover:bg-green-700 py-3 rounded-xl font-semibold">Save</button>
          <button onclick="closeSavingsModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-3 rounded-xl font-semibold">Cancel</button>
        </div>
      </div>
    </div>
  `;

  // Remove existing modal if any
  const oldModal = document.getElementById('savingsModal');
  if (oldModal) oldModal.remove();

  document.body.insertAdjacentHTML('beforeend', modalHTML);
}

function saveSavingsModal() {
  const newItem = {
    id: document.getElementById('modal-id').value || `FD${Date.now().toString().slice(-4)}`,
    type: document.getElementById('modal-type').value,
    bankName: document.getElementById('modal-bank').value,
    principal: parseFloat(document.getElementById('modal-principal').value) || 0,
    interestRate: document.getElementById('modal-rate').value,
    maturityDate: document.getElementById('modal-maturity').value,
    status: document.getElementById('modal-status').value,
    notes: document.getElementById('modal-notes').value,
    Maturity: parseFloat(document.getElementById('modal-principal').value) * 1.12 || 0
  };

  if (editingIndex >= 0) {
    savingsData.savings[editingIndex] = newItem;
  } else {
    savingsData.savings.push(newItem);
  }

  closeSavingsModal();
  renderSavingsTable();
  renderSavingsSummary();
}

function closeSavingsModal() {
  const modal = document.getElementById('savingsModal');
  if (modal) modal.remove();
}

// Break FD/RD
function breakSavings(id, index) {
  if (confirm(`Mark ${id} as Broken?`)) {
    savingsData.savings[index].status = "Broken";
    renderSavingsTable();
    renderSavingsSummary();
  }
}


// ============== NORMALIZE ALL FORMATS ==============
function normalizeTransactions(data) {
  return data.map(t => {
    const cleanNum = (val) => {
      if (!val) return 0;
      return parseFloat(String(val).replace(/,/g, '').trim()) || 0;
    };

    let withdrawal = 0, deposit = 0;

    // ICICI Format
    if (t.transactionType) {
      const amt = cleanNum(t.transactionAmount);
      if (t.transactionType === "DR") withdrawal = amt;
      else if (t.transactionType === "CR") deposit = amt;
    } 
    // HDFC / IDFC Format
    else {
      withdrawal = cleanNum(t['Withdrawal Amt.']);
      deposit = cleanNum(t['Deposit Amt.']);
    }

    return {
      Date: t.Date || t['Date'] || '',
      Narration: t.Narration || t['Narration'] || '',
      Withdrawal: withdrawal,
      Deposit: deposit,
      Balance: cleanNum(t.balance || t['Closing Balance'] || t['balance'])
    };
  });
}

// ============== RENDER ==============
function renderSummary() {
  let totalW = 0, totalD = 0;
  currentTransactions.forEach(t => {
    totalW += t.Withdrawal || 0;
    totalD += t.Deposit || 0;
  });

  document.getElementById('summaryCards').innerHTML = `
    <div class="bg-gray-900 p-5 rounded-2xl border border-red-500/30">
      <p class="text-red-400 text-sm">Total Withdrawals</p>
      <p class="text-2xl font-bold">₹${totalW.toLocaleString('en-IN')}</p>
    </div>
    <div class="bg-gray-900 p-5 rounded-2xl border border-green-500/30">
      <p class="text-green-400 text-sm">Total Deposits</p>
      <p class="text-2xl font-bold">₹${totalD.toLocaleString('en-IN')}</p>
    </div>
    <div class="bg-gray-900 p-5 rounded-2xl border border-blue-500/30">
      <p class="text-blue-400 text-sm">Net Flow</p>
      <p class="text-2xl font-bold ${totalD-totalW >=0 ? 'text-green-400' : 'text-red-400'}">
        ₹${(totalD - totalW).toLocaleString('en-IN')}
      </p>
    </div>
    <div class="bg-gray-900 p-5 rounded-2xl border border-gray-700">
      <p class="text-gray-400 text-sm">Transactions</p>
      <p class="text-2xl font-bold">${currentTransactions.length}</p>
    </div>
  `;
}

function renderTable(transactions) {
  const tbody = document.getElementById('transactionBody');
  tbody.innerHTML = '';

  transactions.forEach(t => {
    const row = document.createElement('tr');
    row.className = "hover:bg-gray-800 transition-colors";
    row.innerHTML = `
      <td class="p-4 whitespace-nowrap">${t.Date}</td>
      <td class="p-4 text-sm">${t.Narration}</td>
      <td class="p-4 text-right text-red-400 font-medium">${t.Withdrawal ? '₹'+t.Withdrawal.toLocaleString('en-IN') : ''}</td>
      <td class="p-4 text-right text-green-400 font-medium">${t.Deposit ? '₹'+t.Deposit.toLocaleString('en-IN') : ''}</td>
      <td class="p-4 text-right font-medium">${t.Balance ? '₹'+t.Balance.toLocaleString('en-IN') : ''}</td>
    `;
    tbody.appendChild(row);
  });
}

function filterTable() {
  const term = document.getElementById('searchInput').value.toLowerCase();
  const filtered = currentTransactions.filter(t => 
    (t.Narration || '').toLowerCase().includes(term)
  );
  renderTable(filtered);
}


// ============== INIT ==============
window.onload = () => {
  loadManifest();
};
</script>
</body>
